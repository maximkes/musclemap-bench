paths:
  musclemap_data_repo: "../musclemap-data"
  musclemap_model_repo: "../musclemap-model"
  musclemap_train_config: "../musclemap-model/config/train.yaml"
  musclemap_checkpoint: "../checkpoints/epoch_0019.pt"
  checkpoints_dir: "../checkpoints"
  curves_dir: "data/curves"
  kinesis_artifacts: "data/kinesis_artifacts"
  results_dir: "results"

test_set:
  dataset_root: "../musclemap-data/data/motionx_activations"
  split: "test"
  max_samples: null
  seed: 42

layer1:
  enabled: true
  dtw_enabled: true
  dtw_radius: 10
  activation_threshold: 0.20
  min_active_frames: 3
  compute_coactivation: true
  muscle_mapping_json: "data/muscle_mapping/rajagopal_kinesis_map.json"

layer2:
  enabled: false
  hml3d_evaluator_path: "data/hml3d_evaluator"
  hml3d_checkname: "finest.tar"
  n_replication: 20
  top_k: [1, 2, 3]
  n_multimodal_gens: 3

kinesis:
  repo_path: "../Kinesis"
  env_name: "myoLegDemo-v0"
  max_frames: 300
  render: false
  max_retries: 3

inference:
  device: "mps"
  batch_size: 1

baselines:
  kinesis_test_paired:
    mae: 0.015919146405351945
    rmse: 0.023700344206934624
    source: "results/results.json layer1_paired (319 seq, 42 muscles)"
  musclemap_test_paired:
    mae: 0.014815474396168624
    rmse: 0.02559290742822762
    source: "results/results.json layer1_paired (319 seq, 42 muscles, epoch_0019, ref_T fix)"

training_curve:
  # DataSphere job (batch_size=2, accumulation_steps=16, ~10831 train sequences)
  batch_size: 2
  accumulation_steps: 16
  train_sequences: 10831
  steps_per_epoch: 5416

resources:
  musclemap_training_gpus: 1
  musclemap_training_gpu_type: "V100-16GB"
  musclemap_training_hours: 14
  kinesis_training_gpus: 1
  kinesis_training_gpu_type: "A100"
  kinesis_training_hours: 240
  motiongpt_training_gpus: 8
  motiongpt_training_gpu_type: "A100-80GB"
  motiongpt_training_hours: 72
